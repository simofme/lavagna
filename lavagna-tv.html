<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavagna · Casa</title>
<style>
@font-face{
  font-family:'system';
}
:root{
  --ink:#1C1B19;
  --paper:#F6F2E9;
  --paper-dim:#EAE3D3;
  --terra:#B6502E;
  --terra-dim:#8A3D23;
  --moss:#4F5D3A;
  --moss-dim:#3C4830;
  --gold:#C9A24B;
  --line:#D9D0BB;
  --ink-soft:#5A5650;
  --white:#FFFFFF;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  width:100vw; height:100vh;
  overflow:hidden;
}

/* ---- Password gate ---- */
#gate{
  position:fixed; inset:0; background:var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:1000;
}
#gate h1{font-family:Georgia,serif; font-size:48px; margin-bottom:8px;}
#gate p{color:#B8B3A8; font-size:20px; margin-bottom:36px;}
#gate input{
  font-size:32px; padding:20px 28px; border-radius:16px; border:2px solid #44403A;
  background:#252320; color:var(--paper); text-align:center; width:360px;
  letter-spacing:4px;
}
#gate input:focus{outline:none; border-color:var(--gold);}
#gateErr{color:var(--terra); margin-top:18px; font-size:18px; height:24px;}

/* ---- Main layout ---- */
#board{
  width:100vw; height:100vh;
  padding:48px 56px;
  display:none;
  flex-direction:column;
}
#board.show{display:flex;}

.header{
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:36px;
  border-bottom:2px solid #3A372F;
  padding-bottom:24px;
}
.h-left{display:flex; align-items:baseline; gap:20px;}
.h-title{font-family:Georgia,serif; font-size:54px; font-weight:700; letter-spacing:-0.01em;}
.h-sub{font-size:22px; color:#9C9688; font-weight:600;}
.h-clock{font-size:34px; font-weight:700; font-variant-numeric:tabular-nums; color:#C9A24B;}
.h-date{font-size:18px; color:#9C9688; text-align:right; margin-top:4px; text-transform:capitalize;}

.body-grid{
  flex:1; display:grid; grid-template-columns:1.1fr 1.4fr; gap:48px;
  min-height:0;
}
.col{display:flex; flex-direction:column; min-height:0;}
.col-title{
  font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em;
  color:#C9A24B; margin-bottom:18px; display:flex; align-items:center; gap:10px;
}
.col-title .n{
  background:#33302A; color:var(--paper); font-size:14px; padding:3px 10px; border-radius:99px;
}

/* Todo list big */
.tlist{flex:1; overflow:hidden; display:flex; flex-direction:column; gap:14px;}
.titem{
  display:flex; align-items:center; gap:18px;
  background:#252320; border-radius:16px; padding:18px 22px;
  border-left:5px solid var(--terra);
}
.titem.generale{border-left-color:var(--moss);}
.titem .tcheck{
  width:30px;height:30px;border-radius:50%; border:2.5px solid #5A564A;
  min-width:30px;
}
.titem .ttext{font-size:25px; font-weight:600; flex:1; line-height:1.25;}
.titem .twho{font-size:16px; color:#9C9688; font-weight:600; white-space:nowrap;}
.tempty{color:#736F62; font-size:22px; font-style:italic; padding:20px 4px;}

/* Week view */
.week{flex:1; display:flex; flex-direction:column; gap:10px; min-height:0;}
.wday{
  background:#252320; border-radius:14px; padding:14px 20px;
  display:flex; align-items:flex-start; gap:18px; flex:1; min-height:0;
}
.wday.today{background:#3A2D20; border:2px solid var(--gold);}
.wd-label{min-width:130px;}
.wd-name{font-size:19px; font-weight:800; text-transform:capitalize;}
.wd-num{font-size:14px; color:#9C9688; font-weight:600;}
.wd-items{flex:1; display:flex; flex-direction:column; gap:6px; justify-content:center;}
.wd-item{font-size:17px; font-weight:600; display:flex; align-items:center; gap:8px;}
.wd-item .d{width:7px;height:7px;border-radius:50%; background:var(--terra); min-width:7px;}
.wd-item.generale .d{background:var(--moss);}
.wd-none{font-size:15px; color:#6B6759; font-style:italic;}

/* Events strip */
.events-strip{
  margin-top:30px; display:flex; gap:18px; overflow:hidden;
}
.evcard{
  background:#252320; border-radius:16px; padding:18px 22px; min-width:220px;
  border-top:4px solid var(--gold);
}
.ev-date{font-size:15px; color:var(--gold); font-weight:800; text-transform:uppercase; letter-spacing:0.04em;}
.ev-title{font-size:21px; font-weight:700; margin-top:6px;}
.ev-time{font-size:14px; color:#9C9688; margin-top:4px; font-weight:600;}

.footer-sync{
  position:fixed; bottom:18px; right:28px; font-size:13px; color:#5A564A; font-weight:600;
}
</style>
</head>
<body>

<div id="gate">
  <h1>🌾 Lavagna</h1>
  <p id="gateLabel">Inserisci la password</p>
  <input type="password" id="gateInput" autofocus inputmode="numeric">
  <div id="gateErr"></div>
</div>

<div id="board">
  <div class="header">
    <div class="h-left">
      <div class="h-title" id="boardTitle">Casa</div>
      <div class="h-sub" id="boardSub">lavagna di famiglia</div>
    </div>
    <div>
      <div class="h-clock" id="clock">--:--</div>
      <div class="h-date" id="dateNow"></div>
    </div>
  </div>

  <div class="body-grid">
    <div class="col">
      <div class="col-title">Da fare <span class="n" id="todoCount">0</span></div>
      <div class="tlist" id="todoList"></div>
    </div>
    <div class="col">
      <div class="col-title">Settimana</div>
      <div class="week" id="weekList"></div>
    </div>
  </div>

  <div class="events-strip" id="eventsStrip"></div>
  <div class="footer-sync" id="footerSync"></div>
</div>

<script>
/* ============================================================
   LAVAGNA TV — Sola lettura, kiosk mode (Fire TV / Smart TV)
   URL: lavagna-tv.html?vista=casa   oppure   ?vista=generale
   ============================================================ */

const JSONBIN_ID = "6a352822da38895dfedd1656";
const JSONBIN_KEY = "$2a$10$g55yrBqDxV/w0kQ/Tzj0r.bZCbqHP7YgZxdKelXFW61V..K0zOFwO";
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

const BOARD_PASSWORD = "1234"; // <-- cambia questa password semplice condivisa in famiglia

const params = new URLSearchParams(window.location.search);
const vista = params.get('vista') === 'generale' ? 'generale' : 'casa';

const TITOLI = {
  casa: { title: 'Casa', sub: 'lavagna di famiglia' },
  generale: { title: 'Generale', sub: 'pollaio · campi · giardino · animali' }
};

/* ---------- Password gate ---------- */
function checkGate(){
  const saved = sessionStorage.getItem('lavagna_tv_auth');
  if(saved === 'ok'){ showBoard(); return; }
}
document.getElementById('gateInput').addEventListener('keyup', (e) => {
  if(e.key === 'Enter'){
    const val = document.getElementById('gateInput').value;
    if(val === BOARD_PASSWORD){
      sessionStorage.setItem('lavagna_tv_auth', 'ok');
      showBoard();
    } else {
      document.getElementById('gateErr').textContent = 'Password errata';
      document.getElementById('gateInput').value = '';
    }
  }
});
function showBoard(){
  document.getElementById('gate').style.display = 'none';
  document.getElementById('board').classList.add('show');
  document.getElementById('boardTitle').textContent = TITOLI[vista].title;
  document.getElementById('boardSub').textContent = TITOLI[vista].sub;
  startClock();
  loadAndRender();
  setInterval(loadAndRender, 30000); // refresh ogni 30s
}

/* ---------- Clock ---------- */
function startClock(){
  function tick(){
    const d = new Date();
    document.getElementById('clock').textContent =
      d.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('dateNow').textContent =
      d.toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'});
  }
  tick();
  setInterval(tick, 10000);
}

/* ---------- Data load ---------- */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function loadAndRender(){
  try{
    const res = await fetch(`${JSONBIN_URL}/latest`, { headers: { 'X-Master-Key': JSONBIN_KEY } });
    if(!res.ok) throw new Error('http ' + res.status);
    const json = await res.json();
    const data = json.record || {};
    renderTodos(data.todos || []);
    renderWeek(data.todos || [], data.eventi || []);
    renderEvents(data.eventi || []);
    document.getElementById('footerSync').textContent =
      'Aggiornato alle ' + new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  }catch(err){
    document.getElementById('footerSync').textContent = 'Connessione assente — riprovo...';
    console.warn('Sync fallito', err);
  }
}

function renderTodos(todos){
  const items = todos.filter(t => t.zona === vista && !t.fatto);
  document.getElementById('todoCount').textContent = items.length;
  const el = document.getElementById('todoList');
  if(items.length === 0){
    el.innerHTML = `<div class="tempty">Niente da fare al momento 🎉</div>`;
    return;
  }
  el.innerHTML = items.slice(0, 8).map(t => `
    <div class="titem ${t.zona}">
      <div class="tcheck"></div>
      <div class="ttext">${escapeHtml(t.testo)}</div>
      ${t.creatoDa ? `<div class="twho">${escapeHtml(t.creatoDa)}</div>` : ''}
    </div>
  `).join('');
}

function renderWeek(todos, eventi){
  const oggi = new Date();
  const offset = (oggi.getDay() + 6) % 7;
  const lunedi = new Date(oggi);
  lunedi.setDate(oggi.getDate() - offset);

  const giorni = [];
  for(let i=0;i<7;i++){
    const d = new Date(lunedi);
    d.setDate(lunedi.getDate() + i);
    giorni.push(d);
  }

  const el = document.getElementById('weekList');
  el.innerHTML = giorni.map(d => {
    const iso = d.toISOString().slice(0,10);
    const isToday = iso === todayISO();
    const dayTodos = todos.filter(t => t.zona === vista && t.dataPrevista === iso && !t.fatto);
    const dayEventi = eventi.filter(e => e.zona === vista && e.data === iso);
    const nome = d.toLocaleDateString('it-IT', {weekday:'long'});

    let itemsHtml = '';
    if(dayTodos.length === 0 && dayEventi.length === 0){
      itemsHtml = `<div class="wd-none">—</div>`;
    } else {
      itemsHtml = [
        ...dayTodos.map(t => `<div class="wd-item ${t.zona}"><span class="d"></span>${escapeHtml(t.testo)}</div>`),
        ...dayEventi.map(e => `<div class="wd-item ${e.zona}"><span class="d"></span>${e.ora?e.ora+' · ':''}${escapeHtml(e.testo)}</div>`)
      ].slice(0,3).join('');
    }

    return `<div class="wday ${isToday?'today':''}">
      <div class="wd-label">
        <div class="wd-name">${nome}</div>
        <div class="wd-num">${d.getDate()}/${d.getMonth()+1}</div>
      </div>
      <div class="wd-items">${itemsHtml}</div>
    </div>`;
  }).join('');
}

function renderEvents(eventi){
  const items = eventi
    .filter(e => e.zona === vista && e.data >= todayISO())
    .sort((a,b) => (a.data+(a.ora||'')).localeCompare(b.data+(b.ora||'')))
    .slice(0, 4);

  const el = document.getElementById('eventsStrip');
  if(items.length === 0){ el.innerHTML = ''; return; }

  const mesi = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
  el.innerHTML = items.map(e => {
    const [y,m,d] = e.data.split('-');
    return `<div class="evcard">
      <div class="ev-date">${parseInt(d)} ${mesi[parseInt(m)-1]}</div>
      <div class="ev-title">${escapeHtml(e.testo)}</div>
      <div class="ev-time">${e.ora ? 'ore '+e.ora : 'Tutto il giorno'}</div>
    </div>`;
  }).join('');
}

checkGate();
</script>
</body>
</html>
